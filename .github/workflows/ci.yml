name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

permissions:
    contents: write

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v7
              with:
                  ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && github.head_ref || github.ref }}
                  persist-credentials: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}

            - name: Setup Vite+
              uses: voidzero-dev/setup-vp@v1
              with:
                  node-version: "22.23.1"
                  cache: true
                  run-install: false

            - name: Install dependencies
              run: vp install --frozen-lockfile

            - name: Install worker dependencies
              working-directory: worker
              run: vp install --frozen-lockfile

            - name: Auto-format
              if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
              run: |
                  vp run format
                  git diff --quiet || {
                    git config user.name "github-actions[bot]"
                    git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                    git add -A
                    git commit -m "style: auto-format"
                    git push
                  }

            - name: Check
              run: vp check

            - name: Typecheck worker
              run: vp run worker:typecheck

            - name: Test
              run: vp test

            - name: Test worker
              run: vp run worker:test

            - name: Build
              run: vp build

            - name: Check internal links
              run: vp run check-links

            - name: Check hybrid design
              run: vp run check:hybrid

            - name: Check Astro output
              run: vp run check:astro-output

            - name: Check search output
              run: vp run check:search

            - name: Check build parity
              run: vp run check:parity
