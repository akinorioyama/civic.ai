name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

permissions:
    contents: write

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v7
              with:
                  ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && github.head_ref || github.ref }}
                  persist-credentials: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2

            - name: Install dependencies
              run: bun --bun install --frozen-lockfile

            - name: Install worker dependencies
              working-directory: worker
              run: bun --bun install --frozen-lockfile

            - name: Auto-format
              if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
              run: |
                  bun --bun run format
                  git diff --quiet || {
                    git config user.name "github-actions[bot]"
                    git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                    git add -A
                    git commit -m "style: auto-format"
                    git push
                  }

            - name: Lint
              run: bun --bun run lint

            - name: Typecheck
              run: bun --bun run check

            - name: Typecheck worker
              run: bun --bun run worker:typecheck

            - name: Test
              run: bun --bun test

            - name: Test worker
              run: bun --bun run worker:test

            - name: Build
              run: bun --bun run build

            - name: Check internal links
              run: bun --bun run check-links

            - name: Check hybrid design
              run: bun --bun run check:hybrid

            - name: Check Astro output
              run: bun --bun run check:astro-output

            - name: Check search output
              run: bun --bun run check:search

            - name: Check build parity
              run: bun --bun run check:parity
