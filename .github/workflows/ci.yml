name: CI

on:
    push:
        branches: [main]
    pull_request_target:
        branches: [main]

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
              with:
                  ref: ${{ github.event.pull_request.head.sha || github.ref }}
                  repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Install worker dependencies
              working-directory: worker
              run: bun install --frozen-lockfile

            - name: Auto-format
              if: github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name == github.repository
              run: |
                  bunx prettier --write .
                  git diff --quiet || {
                    git config user.name "github-actions[bot]"
                    git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                    git add -A
                    git commit -m "style: auto-format with prettier"
                    git push
                  }

            - name: Lint
              run: bun run lint

            - name: Typecheck
              run: bun run check

            - name: Typecheck worker
              run: bun run worker:typecheck

            - name: Test
              run: bun test

            - name: Test worker
              run: bun run worker:test

            - name: Build
              run: bun run build

            - name: Check internal links
              run: bun run check-links

            - name: Check hybrid design
              run: bun run check:hybrid

            - name: Check Astro output
              run: bun run check:astro-output

            - name: Check search output
              run: bun run check:search

            - name: Check build parity
              run: bun run check:parity
