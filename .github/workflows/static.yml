name: Build and Deploy Astro Site

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: "pages"
    cancel-in-progress: false

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Lint
              run: bun run lint

            - name: Typecheck
              run: bun run check

            - name: Test
              run: bun test

            - name: Build site
              run: bun run build

            - name: Check internal links
              run: bun run check-links

            - name: Check hybrid design
              run: bun run check:hybrid

            - name: Check Astro output
              run: bun run check:astro-output

            - name: Check build parity
              run: bun run check:parity

            - name: Configure Pages
              uses: actions/configure-pages@v5

            - name: Upload artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: dist

    deploy:
        if: github.event_name != 'pull_request'
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url || steps.deployment-retry.outputs.page_url }}
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
              continue-on-error: true

            - name: Deploy to GitHub Pages (retry)
              id: deployment-retry
              if: steps.deployment.outcome == 'failure'
              uses: actions/deploy-pages@v4
