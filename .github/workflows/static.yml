name: Build and Deploy Astro Site

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: "pages"
    cancel-in-progress: false

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Setup Vite+
              uses: voidzero-dev/setup-vp@v1
              with:
                  node-version: "22.23.1"
                  cache: true
                  run-install: false

            - name: Install dependencies
              run: vp install --frozen-lockfile

            - name: Install worker dependencies
              working-directory: worker
              run: vp install --frozen-lockfile

            - name: Check
              run: vp check

            - name: Typecheck worker
              run: vp run worker:typecheck

            - name: Test
              run: vp test

            - name: Test worker
              run: vp run worker:test

            - name: Build site
              run: vp build

            - name: Check internal links
              run: vp run check-links

            - name: Check hybrid design
              run: vp run check:hybrid

            - name: Check Astro output
              run: vp run check:astro-output

            - name: Check search output
              run: vp run check:search

            - name: Check build parity
              run: vp run check:parity

            - name: Configure Pages
              uses: actions/configure-pages@v6

            - name: Upload artifact
              uses: actions/upload-pages-artifact@v5
              with:
                  path: dist
                  include-hidden-files: true

    deploy:
        if: github.event_name != 'pull_request'
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url || steps.deployment-retry-1.outputs.page_url || steps.deployment-retry-2.outputs.page_url || steps.deployment-retry-3.outputs.page_url }}
        runs-on: ubuntu-latest
        needs: build
        steps:
            # GitHub Pages deployments intermittently return
            # "Deployment failed, try again later." Wait between attempts so
            # transient Pages-side state can settle before retrying.
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v5
              continue-on-error: true

            - name: Wait before deploy retry 1
              if: steps.deployment.outcome == 'failure'
              run: sleep 30

            - name: Deploy to GitHub Pages (retry 1)
              id: deployment-retry-1
              if: steps.deployment.outcome == 'failure'
              uses: actions/deploy-pages@v5
              continue-on-error: true

            - name: Wait before deploy retry 2
              if: steps.deployment-retry-1.outcome == 'failure'
              run: sleep 60

            - name: Deploy to GitHub Pages (retry 2)
              id: deployment-retry-2
              if: steps.deployment-retry-1.outcome == 'failure'
              uses: actions/deploy-pages@v5
              continue-on-error: true

            - name: Wait before deploy retry 3
              if: steps.deployment-retry-2.outcome == 'failure'
              run: sleep 120

            - name: Deploy to GitHub Pages (retry 3)
              id: deployment-retry-3
              if: steps.deployment-retry-2.outcome == 'failure'
              uses: actions/deploy-pages@v5
