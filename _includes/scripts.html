        <script>
            window.__GLOSSARY__ = [{% for t in glossary %}{"t":"{% if lang2 == 'zh' %}{{ t.term_tw }}{% else %}{{ t.term_en }}{% endif %}","id":"{{ t.id }}"}{% unless forloop.last %},{% endunless %}{% endfor %}];
            window.__GLOSSARY_BASE__ = "{% if lang2 == 'zh' %}/tw/glossary/{% else %}/glossary/{% endif %}";
        </script>
        <script>
            // Inline first-use glossary glossing — runtime only, source MD untouched.
            (function () {
                try {
                    var g = window.__GLOSSARY__;
                    var base = window.__GLOSSARY_BASE__;
                    if (!g || !g.length || !base) return;
                    var main = document.getElementById("main");
                    if (!main) return;
                    // Skip glossary pages themselves
                    if (main.querySelector(".glossary-list")) return;
                    // Idempotency guard
                    if (main.dataset.glossDone) return;
                    main.dataset.glossDone = "1";

                    var isCJK = base.indexOf("/tw/") === 0;

                    // ── Build candidate lists per glossary entry ──────────────────────────
                    // Each entry carries an ordered list of match-form candidates; the first
                    // candidate that hits a text node wins (one link per term per page).
                    //
                    // Derivation rules (applied to every raw term string):
                    //   1. Strip ALL parentheticals — full-width （…） and half-width (…),
                    //      anywhere in the string — to form the "base" candidate.
                    //      e.g. "care ethics (Joan Tronto)" → "care ethics"
                    //           "meronymity (selective-disclosure identity)" → "meronymity"
                    //           "地神（Kami）" → "地神"
                    //   2. If a stripped parenthetical held a SHORT token (no spaces, ≤6 chars,
                    //      e.g. "RLCF"), ALSO add that token as a candidate.
                    //      e.g. "reinforcement learning from… (RLCF)" → also try "RLCF"
                    //   3. If the base contains " / ", split on it and add EACH segment.
                    //      e.g. "bridging / bridging-based ranking" → "bridging" + "bridging-based ranking"
                    //           "sortition / democracy lottery" → "sortition" + "democracy lottery"
                    //   4. EN only: for each candidate also try candidate + "s" (plural tolerance)
                    //      e.g. "decision trace" also tries "decision traces"
                    //   5. De-duplicate; drop any candidate shorter than 2 chars.
                    //   6. Sort entries longest-candidate-first so longer terms win over substrings.

                    function buildCandidates(raw) {
                        var seen = {};
                        var out = [];
                        function add(s) {
                            s = s.trim();
                            if (s.length < 2 || seen[s]) return;
                            seen[s] = true;
                            out.push(s);
                        }

                        // Step 1 & 2: strip parentheticals, collect short tokens inside
                        var shortTokens = [];
                        var base2 = raw.replace(/[（(]([^）)]+)[）)]/g, function (_, inner) {
                            inner = inner.trim();
                            if (inner.indexOf(" ") === -1 && inner.length <= 6) {
                                shortTokens.push(inner);
                            }
                            return "";
                        }).trim();

                        // Step 3: split on " / "
                        var segments = base2.split(" / ");
                        for (var si = 0; si < segments.length; si++) {
                            add(segments[si]);
                        }
                        // Step 2 short tokens
                        for (var ki = 0; ki < shortTokens.length; ki++) {
                            add(shortTokens[ki]);
                        }

                        // Step 4: EN plural tolerance
                        if (!isCJK) {
                            var baseList = out.slice();
                            for (var pi = 0; pi < baseList.length; pi++) {
                                add(baseList[pi] + "s");
                            }
                        }

                        return out;
                    }

                    var entries = [];
                    for (var i = 0; i < g.length; i++) {
                        var candidates = buildCandidates(g[i].t);
                        if (!candidates.length) continue;
                        // Longest candidate drives sort order
                        var maxLen = 0;
                        for (var ci = 0; ci < candidates.length; ci++) {
                            if (candidates[ci].length > maxLen) maxLen = candidates[ci].length;
                        }
                        entries.push({ candidates: candidates, maxLen: maxLen, id: g[i].id });
                    }
                    // Longest-candidate-first so longer terms win over substrings
                    entries.sort(function (a, b) { return b.maxLen - a.maxLen; });

                    // Ancestors to skip text nodes under
                    var SKIP_TAGS = { H1:1, H2:1, H3:1, H4:1, H5:1, H6:1, A:1, CODE:1, PRE:1, BUTTON:1, DT:1, DD:1 };
                    var SKIP_CLASSES = ["in-short", "page-toc", "reading-paths", "agent-note"];

                    function isSkipped(node) {
                        var el = node.parentNode;
                        while (el && el !== main) {
                            if (el.nodeType === 1) {
                                if (SKIP_TAGS[el.tagName]) return true;
                                if (el.hasAttribute("data-no-gloss")) return true;
                                for (var c = 0; c < SKIP_CLASSES.length; c++) {
                                    if (el.classList && el.classList.contains(SKIP_CLASSES[c])) return true;
                                }
                            }
                            el = el.parentNode;
                        }
                        return false;
                    }

                    // Collect text nodes once up front
                    var walker = document.createTreeWalker(main, 4 /* NodeFilter.SHOW_TEXT */);
                    var textNodes = [];
                    var tn;
                    while ((tn = walker.nextNode())) {
                        if (!isSkipped(tn)) textNodes.push(tn);
                    }

                    var linked = {}; // id → already linked

                    for (var ei = 0; ei < entries.length; ei++) {
                        var entry = entries[ei];
                        if (linked[entry.id]) continue;

                        // Try each candidate in order; link the first that hits
                        var didLink = false;
                        for (var ci2 = 0; ci2 < entry.candidates.length && !didLink; ci2++) {
                            var mf = entry.candidates[ci2];

                            for (var ti = 0; ti < textNodes.length && !didLink; ti++) {
                                var node = textNodes[ti];
                                // node may have been split; check it still has a parent
                                if (!node.parentNode) continue;
                                var text = node.nodeValue;
                                if (!text) continue;

                                var idx;
                                if (isCJK) {
                                    idx = text.indexOf(mf);
                                } else {
                                    // word-boundary, case-sensitive
                                    var pattern = "(^|[^A-Za-z0-9_])" + mf.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + "(?=[^A-Za-z0-9_]|$)";
                                    var re = new RegExp(pattern);
                                    var m = re.exec(text);
                                    idx = m ? m.index + m[1].length : -1;
                                }

                                if (idx < 0) continue;

                                // ── Split and wrap ────────────────────────────────────────────
                                // When idx > 0: node splits into prefix (node) + rest (matchNode).
                                // When idx === 0: no prefix needed — splitText(0) would produce
                                //   an empty string node; skip it.
                                var matchNode;
                                if (idx > 0) {
                                    matchNode = node.splitText(idx);
                                } else {
                                    matchNode = node;
                                }
                                var suffixNode = matchNode.splitText(mf.length);

                                var a = document.createElement("a");
                                a.className = "gloss";
                                a.href = base + "#" + entry.id;

                                matchNode.parentNode.insertBefore(a, matchNode);
                                a.appendChild(matchNode);
                                // matchNode is now inside <a> which is in SKIP_TAGS — won't be re-scanned.

                                // ── Fix prefix-orphan bug ─────────────────────────────────────
                                // The original `node` (prefix, if idx > 0) is still in the DOM and
                                // must remain scannable for shorter terms that appear BEFORE this
                                // match in the same original text node.
                                // The suffix (suffixNode) must also remain scannable.
                                //
                                // Strategy: if idx > 0, keep node at textNodes[ti] (prefix stays
                                // in place) and splice suffixNode in at ti+1 (suffix follows it).
                                // If idx === 0, node IS matchNode (now inside <a>); replace it
                                // with suffixNode so the suffix remains scannable.
                                if (idx > 0) {
                                    // textNodes[ti] = node (prefix) — already correct, no change needed
                                    textNodes.splice(ti + 1, 0, suffixNode);
                                } else {
                                    textNodes[ti] = suffixNode;
                                }

                                linked[entry.id] = true;
                                didLink = true;
                            }
                        }
                    }
                } catch (e) {
                    // Degrade silently — never throw into page
                }
            })();
        </script>
        <script>
            // userMoved guard is registered in <head> (before first paint).
            function jumpToHash() {
                if (window.__userMoved || location.hash.length < 2) return;
                var id;
                try {
                    id = decodeURIComponent(location.hash.slice(1));
                } catch (e) {
                    id = location.hash.slice(1);
                }
                var target = document.getElementById(id);
                if (target) target.scrollIntoView();
            }
            window.addEventListener("load", jumpToHash);
            window.__avif.then(function (ok) {
                document.querySelectorAll("noscript").forEach(function (ns) {
                    var html = ns.textContent;
                    if (html.indexOf("<img ") === -1) return;
                    if (ok) {
                        html = html.replace(/\.(jpg|png)(?=["'\s])/g, ".avif");
                        html = html.replace(/\sloading=["']lazy["']/gi, "");
                        html = html.replace(/\sdecoding=["']async["']/gi, "");
                    }
                    var tmp = document.createElement("div");
                    tmp.innerHTML = html;
                    var img = tmp.querySelector("img");
                    if (img) {
                        if (ok) {
                            img.removeAttribute("loading");
                            img.removeAttribute("decoding");
                        }
                        ns.parentNode.insertBefore(img, ns);
                    }
                });
                jumpToHash();
            });
        </script>
        <script>
            // Turn each code block into a terminal copy-box with a Copy button.
            (function () {
                var zh =
                    (document.documentElement.lang || "").indexOf("zh") === 0;
                var L = zh
                    ? { copy: "複製", done: "已複製" }
                    : { copy: "Copy", done: "Copied" };
                document.querySelectorAll("main pre").forEach(function (pre) {
                    if (
                        pre.parentElement &&
                        pre.parentElement.classList.contains("code-block")
                    )
                        return;
                    var wrap = document.createElement("div");
                    wrap.className = "code-block";
                    pre.parentNode.insertBefore(wrap, pre);
                    wrap.appendChild(pre);
                    var btn = document.createElement("button");
                    btn.type = "button";
                    btn.className = "copy-btn";
                    btn.textContent = L.copy;
                    btn.setAttribute("aria-label", L.copy);
                    btn.addEventListener("click", function () {
                        var code = pre.querySelector("code");
                        var text = code ? code.innerText : pre.innerText;
                        navigator.clipboard.writeText(text).then(
                            function () {
                                btn.textContent = L.done;
                                btn.classList.add("copied");
                                setTimeout(function () {
                                    btn.textContent = L.copy;
                                    btn.classList.remove("copied");
                                }, 1500);
                            },
                            function () {}
                        );
                    });
                    wrap.appendChild(btn);
                });
            })();
        </script>
        <script>
            // Build an on-this-page table of contents for long pages.
            (function () {
                var main = document.getElementById("main");
                if (!main) return;
                if (main.querySelector(".page-toc")) return;
                var heads = main.querySelectorAll(
                    "h1[id],h2[id],h3[id],h4[id]"
                );
                if (heads.length < 6) return;
                var zh =
                    (document.documentElement.lang || "").indexOf("zh") === 0;
                var details = document.createElement("details");
                details.className = "page-toc";
                details.setAttribute("role", "navigation");
                details.setAttribute("aria-label", zh ? "本頁內容" : "On this page");
                details.open = window.matchMedia("(min-width: 720px)").matches;
                var sum = document.createElement("summary");
                sum.textContent = zh ? "本頁內容" : "On this page";
                details.appendChild(sum);
                var ul = document.createElement("ul");
                heads.forEach(function (h) {
                    var li = document.createElement("li");
                    li.className = "page-toc__" + h.tagName.toLowerCase();
                    var a = document.createElement("a");
                    a.href = "#" + h.id;
                    a.textContent = (h.getAttribute("data-toc") || h.textContent || "").trim();
                    li.appendChild(a);
                    ul.appendChild(li);
                });
                details.appendChild(ul);
                var card = main.querySelector(".in-short");
                if (card) card.insertAdjacentElement("afterend", details);
                else main.insertBefore(details, main.firstChild);
            })();
        </script>
